# Fork of simple.yaml tuned for tests/test_pipeline/test_mejiro_pipeline.py::test_pipeline_run.
# Loaded automatically by Pipeline(_test_mode=True). Keep in sync with simple.yaml when schema changes.
data_dir: &data_dir null
pipeline_label: test
psf_cache_dir: tests/test_data
dev: True
nice: 19
show_progress_bar: True
suppress_warnings: True
logging_level: WARNING
limit: 1
seed: &seed 42
cores:
  script_00: 1
  script_01: 1
  script_01a: 1
  script_01b: 1
  script_03: 1
  script_04: 1
  script_05: 1
  script_snr: 1
jaxtronomy:
  use_jax: False
  jax_platform: cpu
instrument: roman
survey:
  runs: 1
  num_galaxy_tables: 1
  speed_factor: 4
  area: 0.1
  skypy_config: lsst-like_triple_SF_test
  write_to_csv: True
  total_population: True
  use_real_sources: False
  catalog_source_kwargs:
    catalog_path: /data/bwedig/COSMOS
    catalog_type: COSMOS
    sersic_fallback: True
    max_scale: 1
  use_slhammocks_pipeline: False
  slhammocks_pipeline_kwargs:
    skypy_config: slhammocks
    slhammocks_config: null
    loghm_min: 11
    loghm_max: 15
  detectors: &detectors [1]
  bands: [F106, F129]
  deflector_cut_band: F129
  deflector_cut_band_max: 24
  deflector_z_min: 0.01
  deflector_z_max: 2.0
  source_cut_band: F129
  source_cut_band_max: 24
  source_z_min: 0.01
  source_z_max: 3.0
  min_image_separation: 0.3
  max_image_separation: 10.0
  mag_arc_limit_band: F129
  mag_arc_limit: 24
  magnification: 2
subhalos:
  fraction: 1.
  pyhalo_model: CDM
  realization_kwargs:
    log_mlow: 9
    log_mhigh: 12
    LOS_normalization: 1.
    concentration_model_subhalos: LUDLOW2016
    concentration_model_fieldhalos: LUDLOW2016
    shmf_log_slope: -1.9
synthetic_image:
  bands: [F106]
  fov_arcsec: 2.5
  supersampling_compute_mode: adaptive
  supersampling_factor: &supersampling_factor 1
  pieces: True
imaging:
  exposure_time: &exposure_time 10000
  engine: galsim
  engine_params:
    rng_seed: *seed
    min_zodi_factor: 1.
    sky_background: True
    detector_effects: True
    poisson_noise: True
    reciprocity_failure: True
    dark_noise: True
    nonlinearity: True
    ipc: True
    read_noise: True
snr:
  snr_band: F106
  snr_exposure_time: *exposure_time
  snr_fov_arcsec: 2.5
  snr_supersampling_compute_mode: adaptive
  snr_supersampling_factor: &snr_supersampling_factor 1
  snr_threshold: 5
  snr_per_pixel_threshold: 1
  snr_detector_position: [2043, 2043]
psf:
  bands: [F106]
  oversamples: [1]
  num_pixes: [73]
  detectors: *detectors
  divide_up_detector: 1
dataset:
  version: 0.1
  include_psfs: True
  include_synthetic_images: True
